name: Trivy によるスキャン

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Local Image
        run: docker build -t trivy-test:local .

      - name: Run Trivy scan (OS & App)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'trivy-test:local'
          format: 'html'
          output: 'trivy-results.html'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'trivy-test:local'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload scan results as assets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: |
            trivy-results.html
            sbom.json